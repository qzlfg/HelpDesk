volumes:
  postgres_data:
    name: enterprise_postgres_data
  redis_data:
    name: enterprise_redis_data

networks:
  backend_network:
    driver: bridge
    name: enterprise_backend_network

services:
  database:
    image: postgres:18-alpine
    container_name: production_postgres
    restart: always
    networks:
      - backend_network
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASS:-he1pdesk_secret_passw0rd}
      POSTGRES_DB: ${DB_NAME:-helpdesk_db}
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: valkey/valkey:9-alpine
    container_name: production_redis
    restart: always
    networks:
      - backend_network
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5